name: Solemne 1 — CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Solenme_1_FastAPI/**'
  pull_request:
    branches: [main]
    paths:
      - 'Solenme_1_FastAPI/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependencias
        run: uv pip install --system -r requirements.txt
        working-directory: Solenme_1_FastAPI/time-api-fastapi

      - name: Linting con ruff
        run: ruff check .
        working-directory: Solenme_1_FastAPI/time-api-fastapi

      - name: Correr tests
        run: pytest
        working-directory: Solenme_1_FastAPI/time-api-fastapi

      - name: Construir imagen Docker
        run: docker build -t bazzty/time-api-fastapi .
        working-directory: Solenme_1_FastAPI/time-api-fastapi

      - name: Login en Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Publicar imagen en Docker Hub
        run: docker push bazzty/time-api-fastapi
